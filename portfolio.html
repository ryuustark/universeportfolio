<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Constellation | Professional Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg: #0a0a0f;
  --color-border: rgba(204,0,0,0.25);
  --color-text: #e8d8f0;
  --color-text-muted: #a080b0;
  --color-accent: #cc0000;
  --color-accent-glow: rgba(204,0,0,0.5);
  --color-accent-dark: #770000;
  --color-purple: #7700bb;
  --color-purple-dark: #440066;
  --font-display: "Cinzel Decorative","Cinzel",serif;
  --font-body: "Cinzel",serif;
  --text-xs: clamp(0.65rem,0.6rem + 0.2vw,0.75rem);
  --text-sm: clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-base: clamp(0.875rem,0.8rem + 0.3vw,1rem);
  --text-lg: clamp(1rem,0.9rem + 0.5vw,1.25rem);
  --text-xl: clamp(1.25rem,1rem + 1vw,1.75rem);
  --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-6: 1.5rem;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 9999px;
  --transition: 280ms cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{
  min-height:100dvh;
  font-family:var(--font-body);
  background:var(--color-bg);
  color:var(--color-text);
  overflow:hidden;
  display:flex;
  flex-direction:row;
}
.bg-nebula{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%,rgba(70,0,40,0.4) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 30%,rgba(80,0,60,0.3) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 70%,rgba(40,0,80,0.3) 0%,transparent 60%),
    var(--color-bg);
}
.star-field{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.star-field::before,.star-field::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle,rgba(255,255,255,0.9) 1px,transparent 1px),
    radial-gradient(circle,rgba(220,100,100,0.7) 1px,transparent 1px),
    radial-gradient(circle,rgba(180,100,180,0.5) 0.5px,transparent 0.5px);
  background-size:300px 200px,200px 300px,400px 250px;
  background-position:0 0,50px 80px,120px 30px;
  animation:twinkle 8s ease-in-out infinite alternate;
}
.star-field::after{
  background-size:250px 350px,350px 150px,180px 400px;
  background-position:30px 20px,100px 150px,200px 60px;
  animation-delay:-4s;animation-duration:10s;
}
@keyframes twinkle{0%{opacity:0.6}50%{opacity:1}100%{opacity:0.7}}

/* Side Menu */
.side-menu{
  position:fixed;left:0;top:0;width:220px;height:100dvh;
  background:linear-gradient(135deg,rgba(10,5,20,0.95),rgba(5,0,15,0.95));
  border-right:2px solid var(--color-border);
  backdrop-filter:blur(12px);
  z-index:50;
  display:flex;flex-direction:column;
  padding:var(--space-6);gap:var(--space-6);
  overflow-y:auto;
}
.menu-profile{
  display:flex;flex-direction:column;gap:var(--space-3);
  padding-bottom:var(--space-4);
  border-bottom:1px solid var(--color-border);
}
.profile-title{
  font-family:var(--font-display);
  font-size:var(--text-lg);
  color:var(--color-accent);
  letter-spacing:0.1em;
  text-shadow:0 0 15px var(--color-accent-glow);
}
.profile-subtitle{
  font-size:var(--text-sm);
  color:var(--color-text-muted);
  letter-spacing:0.05em;
}
.menu-contacts{
  display:flex;flex-direction:column;gap:var(--space-3);
}
.contact-item{
  display:flex;align-items:center;gap:var(--space-3);
  padding:var(--space-2) var(--space-3);
  background:rgba(204,0,0,0.08);
  border:1px solid var(--color-border);
  border-radius:var(--radius-sm);
  text-decoration:none;
  color:var(--color-text);
  transition:all var(--transition);
  font-size:var(--text-xs);
  cursor:pointer;
}
.contact-item:hover{
  background:rgba(204,0,0,0.2);
  border-color:var(--color-accent);
  color:var(--color-accent);
  box-shadow:0 0 12px var(--color-accent-glow);
}
.contact-icon{
  font-size:1.2rem;
}

.ui-wrapper{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  width:calc(100% - 220px);height:100dvh;
  margin-left:220px;
  padding:var(--space-4);gap:var(--space-3);
}
.header{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-3) var(--space-6);
  background:linear-gradient(135deg,rgba(40,10,25,0.9),rgba(15,5,20,0.9));
  border:1px solid var(--color-border);border-radius:var(--radius-md);
  backdrop-filter:blur(12px);
}
.header-title{
  font-family:var(--font-display);font-size:var(--text-xl);
  color:var(--color-accent);letter-spacing:0.1em;
  text-shadow:0 0 20px var(--color-accent-glow),0 0 40px rgba(204,0,0,0.2);
}
.header-character{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.char-name{font-size:var(--text-sm);color:var(--color-text);letter-spacing:0.08em;}
.char-level{font-size:var(--text-xs);color:var(--color-accent);letter-spacing:0.06em;}
.perk-points{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text);}
.perk-diamond{
  width:10px;height:10px;background:var(--color-accent);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  box-shadow:0 0 8px var(--color-accent-glow);
}
.main-area{display:flex;flex:1;width:100%;gap:var(--space-4);min-height:0;padding-bottom:var(--space-4);flex-direction:column;position:relative;}
/* ── Skill Wheel ─────────────────────────────── */
.skill-wheel-wrap{
  flex:1;width:100%;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.wheel-scene{
  perspective:600px;perspective-origin:50% 50%;
  width:100%;height:120px;overflow:hidden;
}
.wheel-rotor{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform 600ms ease;
  transform:rotateY(0deg);
}
.wheel-item{
  position:absolute;top:50%;left:50%;
  width:140px;height:58px;
  margin-top:-29px;margin-left:-70px;
  display:flex;flex-direction:column;align-items:flex-start;
  gap:3px;padding:8px 12px;
  background:rgba(30,10,20,0.7);border:1px solid rgba(204,0,0,0.2);
  border-radius:4px;cursor:pointer;
  transition:opacity var(--transition),color var(--transition),border-color var(--transition),box-shadow var(--transition);
  user-select:none;backface-visibility:hidden;
}
.wheel-item:hover{border-color:rgba(204,0,0,0.45);background:rgba(50,15,30,0.85);}
.wheel-item.active{
  border-color:#cc0000;background:rgba(60,10,20,0.95);
  box-shadow:0 0 18px rgba(204,0,0,0.4),inset 0 0 10px rgba(204,0,0,0.08);
}
.wi-name{
  font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;
  color:#e8d8f0;transition:color var(--transition);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}
.wheel-item.active .wi-name{color:#cc0000;text-shadow:0 0 10px rgba(204,0,0,0.7);}
.wi-bar{width:100%;height:2px;background:rgba(120,0,60,0.3);border-radius:9999px;overflow:hidden;}
.wi-fill{height:100%;background:#804040;border-radius:9999px;transition:background var(--transition);}
.wheel-item.active .wi-fill{background:#cc0000;}
.wi-level{font-size:0.65rem;color:#a080b0;letter-spacing:0.06em;transition:color var(--transition);}
.wheel-item.active .wi-level{color:#cc0000;}
.wheel-fade-top,.wheel-fade-bottom{position:absolute;left:0;right:0;height:60px;pointer-events:none;z-index:2;}
.wheel-fade-top{top:0;background:linear-gradient(to bottom,#0a0a0f 0%,transparent 100%);}
.wheel-fade-bottom{bottom:0;background:linear-gradient(to top,#0a0a0f 0%,transparent 100%);}
.constellation-panel{
  position:absolute;left:0;right:0;bottom:0;
  height:60%;z-index:20;
  background:linear-gradient(to bottom,rgba(10,5,15,0.85) 0%,rgba(10,5,15,0.97) 30%);
  border-top:1px solid var(--color-border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  overflow:hidden;backdrop-filter:blur(16px);
  transform:translateY(100%);opacity:0;pointer-events:none;
  transition:transform 500ms cubic-bezier(0.16,1,0.3,1),opacity 400ms ease;
}
.constellation-panel.revealed{
  transform:translateY(0);opacity:1;pointer-events:auto;
}
.constellation-title{
  position:absolute;top:var(--space-4);left:50%;transform:translateX(-50%);
  font-family:var(--font-display);font-size:var(--text-xl);
  color:var(--color-accent);letter-spacing:0.12em;
  text-shadow:0 0 24px var(--color-accent-glow);
  white-space:nowrap;z-index:2;pointer-events:none;
}
.constellation-level{
  position:absolute;top:calc(var(--space-4) + 2rem);left:50%;transform:translateX(-50%);
  font-size:var(--text-xs);color:var(--color-text-muted);
  letter-spacing:0.15em;text-transform:uppercase;z-index:2;pointer-events:none;
}
.constellation-svg{position:absolute;inset:0;width:100%;height:100%;}
.node{cursor:pointer;}
.info-panel{
  position:absolute;bottom:var(--space-4);left:50%;
  transform:translateX(-50%) translateY(8px);
  min-width:280px;max-width:360px;
  padding:var(--space-4) var(--space-6);
  background:linear-gradient(135deg,rgba(20,8,20,0.97),rgba(10,5,15,0.98));
  border:1px solid rgba(204,0,0,0.5);border-radius:var(--radius-md);
  backdrop-filter:blur(16px);z-index:10;
  text-align:center;opacity:0;
  transition:opacity var(--transition),transform var(--transition);
  pointer-events:none;
  box-shadow:0 4px 32px rgba(0,0,0,0.6),0 0 20px rgba(204,0,0,0.12);
}
.info-panel.visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.info-panel-name{
  font-family:var(--font-display);font-size:var(--text-lg);
  color:var(--color-accent);letter-spacing:0.08em;margin-bottom:var(--space-2);
  text-shadow:0 0 16px var(--color-accent-glow);
}
.info-panel-desc{font-size:var(--text-sm);color:var(--color-text);line-height:1.6;margin-bottom:var(--space-3);max-width:50ch;}
.info-panel-rank{font-size:var(--text-xs);color:var(--color-text-muted);letter-spacing:0.12em;text-transform:uppercase;}
.gold-sep{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--color-accent),transparent);margin:var(--space-2) auto;opacity:0.6;}
.info-panel-btn{
  margin-top:var(--space-3);padding:var(--space-2) var(--space-6);
  background:linear-gradient(135deg,rgba(204,0,0,0.15),rgba(204,0,0,0.08));
  border:1px solid rgba(204,0,0,0.5);border-radius:var(--radius-sm);
  color:var(--color-accent);font-family:var(--font-body);
  font-size:var(--text-xs);letter-spacing:0.15em;text-transform:uppercase;
  cursor:pointer;transition:all var(--transition);
}
.info-panel-btn:hover{background:rgba(204,0,0,0.25);box-shadow:0 0 12px rgba(204,0,0,0.3);}
.info-panel-btn:disabled{opacity:0.4;cursor:not-allowed;}
.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--space-2) var(--space-6);
  background:rgba(10,5,15,0.9);border-top:1px solid var(--color-border);
  font-size:var(--text-xs);color:var(--color-text-muted);
  letter-spacing:0.1em;text-transform:uppercase;z-index:5;
}
.key-hint{
  display:inline-flex;align-items:center;justify-content:center;
  padding:1px var(--space-2);
  background:rgba(80,0,60,0.7);border:1px solid rgba(204,0,0,0.3);
  border-radius:3px;font-size:var(--text-xs);margin-right:4px;
}
@media (max-width:768px){
  .side-menu{width:100%;height:auto;flex-direction:row;border-right:none;border-bottom:2px solid var(--color-border);padding:var(--space-3);}
  .menu-profile,.menu-contacts{flex-direction:row;gap:var(--space-4);}
  .ui-wrapper{width:100%;margin-left:0;}
  .skill-wheel-wrap{height:90px;}
  .wheel-scene{height:90px;}
  .wheel-item{width:100px;height:50px;margin-top:-25px;margin-left:-50px;padding:6px 8px;}
  .wi-name{font-size:0.58rem;}
  body{flex-direction:column;}
}
</style>
</head>

let currentTree="salesforce",selectedNode=null,perkPoints=3;

// 3D Wheel Configuration
const WHEEL_ITEMS=[
  {key:"salesforce",label:"Salesforce",level:90},
  {key:"ai_explorations",label:"AI Explorations",level:10},
  {key:"devops",label:"DevOps",level:30},
  {key:"3dmodel",label:"3D Model",level:20},
  {key:"3dprint",label:"3D Print",level:50},
  {key:"painting",label:"Painting",level:30},
  {key:"notion",label:"Notion",level:1},
  {key:"org",label:"Organize",level:1},
  {key:"blog",label:"Blog",level:1}
];
const WHEEL_COUNT=WHEEL_ITEMS.length;
const WHEEL_STEP=360/WHEEL_COUNT;
const WHEEL_RADIUS=200;
let wheelCurrentIndex=0;
let wheelAngle=0;
let scrollLocked=false;

function starPoints(cx,cy,outerR,innerR,pts){
  let p=[];
  for(let i=0;i<pts*2;i++){
    const a=(i*Math.PI)/pts-Math.PI/2,r=i%2===0?outerR:innerR;
    p.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`);
  }
  return p.join(" ");
}

function renderTree(key){
  const tree=trees[key];
  const ll=document.getElementById("lines-layer");
  const nl=document.getElementById("nodes-layer");
  ll.innerHTML="";nl.innerHTML="";
  document.getElementById("tree-title").textContent=tree.title;
  document.getElementById("tree-level").textContent="Skill Level: "+tree.level;
  const map={};
  tree.nodes.forEach(n=>map[n.id]=n);
  // Lines
  tree.nodes.forEach(n=>{
    n.parents.forEach(pid=>{
      const p=map[pid];if(!p)return;
      const active=n.unlocked&&p.unlocked;
      const line=document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1",p.x);line.setAttribute("y1",p.y);
      line.setAttribute("x2",n.x);line.setAttribute("y2",n.y);
      line.setAttribute("stroke",active?"rgba(204,0,0,0.65)":"rgba(120,0,60,0.25)");
      line.setAttribute("stroke-width",active?"2":"1.5");
      if(!active)line.setAttribute("stroke-dasharray","5,4");
      ll.appendChild(line);
    });
  });
  // Nodes
  tree.nodes.forEach(n=>{
    const g=document.createElementNS("http://www.w3.org/2000/svg","g");
    g.setAttribute("transform",`translate(${n.x},${n.y})`);
    g.style.cursor="pointer";
    g.addEventListener("mouseenter",()=>showInfo(n));
    g.addEventListener("click",()=>showInfo(n));
    const r=n.size;
    if(n.master){
      const glow=document.createElementNS("http://www.w3.org/2000/svg","circle");
      glow.setAttribute("r",r+10);
      glow.setAttribute("fill",n.unlocked?"rgba(204,0,0,0.07)":"rgba(80,0,60,0.07)");
      g.appendChild(glow);
    }
    const bg=document.createElementNS("http://www.w3.org/2000/svg","circle");
    bg.setAttribute("r",r);
    bg.setAttribute("fill",n.unlocked?"rgba(60,20,40,0.9)":"rgba(20,10,25,0.85)");
    g.appendChild(bg);
    const ring=document.createElementNS("http://www.w3.org/2000/svg","circle");
    ring.setAttribute("r",r);ring.setAttribute("fill","none");
    ring.setAttribute("stroke",n.unlocked?"rgba(204,0,0,0.9)":"rgba(120,0,60,0.5)");
    ring.setAttribute("stroke-width",n.master?"2.5":"1.5");
    g.appendChild(ring);
    if(n.master){
      const ring2=document.createElementNS("http://www.w3.org/2000/svg","circle");
      ring2.setAttribute("r",r+5);ring2.setAttribute("fill","none");
      ring2.setAttribute("stroke",n.unlocked?"rgba(204,0,0,0.3)":"rgba(120,0,60,0.15)");
      ring2.setAttribute("stroke-width","1");ring2.setAttribute("stroke-dasharray","4,3");
      g.appendChild(ring2);
    }
    const star=document.createElementNS("http://www.w3.org/2000/svg","polygon");
    star.setAttribute("points",starPoints(0,0,r*0.55,r*0.25,5));
    star.setAttribute("fill",n.unlocked?"#cc0000":"#804040");
    if(n.unlocked)star.setAttribute("filter","url(#glow-accent)");
    g.appendChild(star);
    const label=document.createElementNS("http://www.w3.org/2000/svg","text");
    label.setAttribute("y",r+14);label.setAttribute("text-anchor","middle");
    label.setAttribute("font-family","Cinzel,serif");
    label.setAttribute("font-size",n.master?"11":"9");
    label.setAttribute("fill",n.unlocked?"#cc0000":"#805070");
    label.setAttribute("letter-spacing","1");
    label.textContent=n.label;
    g.appendChild(label);
    nl.appendChild(g);
  });
}

function showInfo(node){
  const panel=document.getElementById("info-panel");
  document.getElementById("info-name").textContent=node.label;
  document.getElementById("info-desc").textContent=node.desc;
  document.getElementById("info-rank").textContent=node.rank;
  const btn=document.getElementById("info-btn");
  if(node.unlocked){btn.textContent="Mastered ✦";btn.disabled=true;}
  else if(perkPoints>0){btn.textContent="Learn More";btn.disabled=false;}
  else{btn.textContent="No Points Left";btn.disabled=true;}
  selectedNode=node;
  panel.classList.add("visible");
}

function spendPerk(){
  if(!selectedNode||selectedNode.unlocked||perkPoints<=0)return;
  selectedNode.unlocked=true;perkPoints--;
  document.getElementById("perk-count").textContent=perkPoints+" Skill"+(perkPoints!==1?"s":"")+" Unlocked";
  renderTree(currentTree);
  showInfo(selectedNode);
}

function buildWheel(){
  const rotor=document.getElementById("wheel-rotor");
  rotor.innerHTML="";
  WHEEL_ITEMS.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="wheel-item"+(i===wheelCurrentIndex?" active":"");
    div.dataset.key=item.key;
    div.dataset.index=i;
    const itemAngle=i*WHEEL_STEP;
    div.style.transform=`rotateY(${itemAngle}deg) translateZ(${WHEEL_RADIUS}px)`;
    div.innerHTML=`<span class="wi-name">${item.label}</span><div class="wi-bar"><div class="wi-fill" style="width:${item.level}%"></div></div><span class="wi-level">${item.level}</span>`;
    div.addEventListener("click",()=>wheelSelectIndex(i,true));
    rotor.appendChild(div);
  });
  applyWheelRotation();
}

function applyWheelRotation(){
  const rotor=document.getElementById("wheel-rotor");
  rotor.style.transform=`rotateY(${wheelAngle}deg)`;
  updateWheelItemStyles();
}

function updateWheelItemStyles(){
  const items=document.querySelectorAll(".wheel-item");
  items.forEach((el,i)=>{
    let net=((i*WHEEL_STEP)+wheelAngle)%360;
    if(net>180)net-=360;
    if(net<-180)net+=360;
    const absAngle=Math.abs(net);
    const angleRad=absAngle*(Math.PI/180);
    const rawOpacity=(Math.cos(angleRad)+1)/2;
    const opacity=0.1+rawOpacity*0.9;
    el.style.opacity=opacity.toFixed(3);
    el.classList.toggle("active",i===wheelCurrentIndex);
    el.style.pointerEvents=absAngle>=90?"none":"auto";
  });
}

function wheelSelectIndex(targetIndex,fromClick=false){
  if(targetIndex===wheelCurrentIndex)return;
  let delta=targetIndex-wheelCurrentIndex;
  if(delta>WHEEL_COUNT/2)delta-=WHEEL_COUNT;
  if(delta<-WHEEL_COUNT/2)delta+=WHEEL_COUNT;
  wheelAngle-=delta*WHEEL_STEP;
  wheelCurrentIndex=targetIndex;
  applyWheelRotation();
  if(fromClick){
    document.getElementById("constellation-panel").classList.add("revealed");
  }
  wheelSwitchTree(WHEEL_ITEMS[targetIndex].key);
}

function wheelSwitchTree(key){
  currentTree=key;selectedNode=null;
  document.getElementById("info-panel").classList.remove("visible");
  renderTree(key);
}


function initWheelScroll(){
  const wrap=document.querySelector(".skill-wheel-wrap");
  wrap.addEventListener("wheel",(e)=>{
    e.preventDefault();
    if(scrollLocked)return;
    scrollLocked=true;
    const delta=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
    const direction=delta>0?1:-1;
    const nextIndex=(wheelCurrentIndex+direction+WHEEL_COUNT)%WHEEL_COUNT;
    wheelSelectIndex(nextIndex,false);
    setTimeout(()=>{scrollLocked=false;},650);
  },{passive:false});
}

function switchTree(key,btn){
  const idx=WHEEL_ITEMS.findIndex(it=>it.key===key);
  if(idx>=0){wheelSelectIndex(idx,true);}
  else{currentTree=key;selectedNode=null;document.getElementById("info-panel").classList.remove("visible");renderTree(key);}
}

buildWheel();
initWheelScroll();
renderTree(currentTree);

// Dismiss constellation on wheel click
document.querySelector(".skill-wheel-wrap").addEventListener("click",function(e){
  const panel=document.getElementById("constellation-panel");
  if(!panel.classList.contains("revealed"))return;
  if(e.target.closest(".wheel-item"))return;
  panel.classList.remove("revealed");
  document.getElementById("info-panel").classList.remove("visible");
  selectedNode=null;
});

document.getElementById("constellation-panel").addEventListener("click",function(e){
  if(e.target===this||e.target.id==="constellation-svg"){
    document.getElementById("info-panel").classList.remove("visible");
    selectedNode=null;
  }
});
</script>
