name: Deploy Portfolio

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production"
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages (/docs)
        if: github.event.inputs.deploy == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        run: |
          # Clear old /docs content
          rm -rf docs/*

          # Copy from dev to docs
          mkdir -p docs/css docs/js
          cp project/dev/index.html docs/index.html
          cp -r project/dev/css/* docs/css/
          cp -r project/dev/js/* docs/js/

          echo "✅ Deployed to /docs for GitHub Pages"

      - name: Commit and push deployment
        if: github.event.inputs.deploy == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git commit -m "Deploy: publish portfolio to /docs for GitHub Pages [skip ci]" || echo "No changes to commit"
          git push